<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <meta name="description" content="todo App intermediate level from frontend mentor"> 

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=League+Spartan:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <title>Frontend Mentor | Todo app</title>

</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Task for today</h1>
      <p>All Caught up</p>
    </div>
    <div class="input">
      <input type="text" placeholder="What needs to be done">
      <button class="add">Add Task</button>
    </div>
    <div class="content">
      <div class="head">
        <div class="filter">
          <button class="active all">ALL <span class="lenegthAll"></span></button>
          <button class="act">Active <span class="lengthstill"></span></button>
          <button class="com">completed <span class="lengthcompleted"></span></button>
        </div>
      </div>
      <div class="contents">
            No Tasks To Show Yet
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
